apiVersion: apps/v1
kind: Deployment
metadata:
  name: flash-card-io
  namespace: flash-card-io
  labels:
    app: flash-card-io
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: flash-card-io
  template:
    metadata:
      labels:
        app: flash-card-io
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: flash-card-io
          image: ghcr.io/hatip5656/flash-card-io:latest
          imagePullPolicy: Always
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: flash-card-io-secrets
                  key: TELEGRAM_BOT_TOKEN
            - name: UNSPLASH_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: flash-card-io-secrets
                  key: UNSPLASH_ACCESS_KEY
            - name: EKILEX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: flash-card-io-secrets
                  key: EKILEX_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flash-card-io-secrets
                  key: DATABASE_URL

            - name: CRON_SCHEDULE
              value: "0 9 * * *"
            - name: CRON_TIMEZONE
              value: "Europe/Tallinn"
            - name: CEFR_LEVELS
              value: "A1,A2,B1,B2"
            - name: FEATURE_TELEGRAM
              value: "true"
            - name: FEATURE_WHATSAPP
              value: "false"
            - name: TTS_API_URL
              value: "http://tts-api:8000"
            - name: CACHE_DIR
              value: "/app/cache"
            - name: TTS_SPEAKER
              value: "mari"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=512"
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: cache
              mountPath: /app/cache
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 768Mi
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: flash-card-cache
      imagePullSecrets:
        - name: ghcr-secret
