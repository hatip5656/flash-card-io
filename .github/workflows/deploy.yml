name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/flash-card-io
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base sshpass

      - name: Setup SSH known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Kubernetes
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          EKILEX_API_KEY: ${{ secrets.EKILEX_API_KEY }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ vars.DB_NAME }}
        run: |
          # Construct DATABASE_URL from parts
          DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"

          # Create deployment directory on server
          sshpass -p "$SERVER_PASSWORD" ssh "$SERVER_USER@$SERVER_HOST" "mkdir -p ~/k8s/flash-card-io"

          # Copy k8s manifests
          sshpass -p "$SERVER_PASSWORD" scp -r k8s/* "$SERVER_USER@$SERVER_HOST:~/k8s/flash-card-io/"

          # Deploy
          sshpass -p "$SERVER_PASSWORD" ssh "$SERVER_USER@$SERVER_HOST" bash -s <<DEPLOY_SCRIPT
            cd ~/k8s/flash-card-io

            # Create namespace
            kubectl apply -f namespace.yaml

            # Create/update docker registry secret
            kubectl create secret docker-registry ghcr-secret \
              --namespace=flash-card-io \
              --docker-server=ghcr.io \
              --docker-username=hatip5656 \
              --docker-password=${GHCR_PAT} \
              --dry-run=client -o yaml | kubectl apply -f -

            # Create/update app secrets
            kubectl create secret generic flash-card-io-secrets \
              --namespace=flash-card-io \
              --from-literal=TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN}" \
              --from-literal=UNSPLASH_ACCESS_KEY="${UNSPLASH_ACCESS_KEY}" \
              --from-literal=EKILEX_API_KEY="${EKILEX_API_KEY}" \
              --from-literal=DATABASE_URL="${DATABASE_URL}" \
              --dry-run=client -o yaml | kubectl apply -f -

            # Update image tag
            sed -i "s|ghcr.io/hatip5656/flash-card-io:latest|ghcr.io/hatip5656/flash-card-io:${IMAGE_TAG:-latest}|g" deployment.yaml

            # Apply manifests
            kubectl apply -f namespace.yaml
            kubectl apply -f neurokone.yaml
            kubectl apply -f cache-pvc.yaml
            kubectl apply -f deployment.yaml

            # Restart to pick up latest image
            kubectl rollout restart deployment/flash-card-io -n flash-card-io

            # Wait for rollout
            kubectl rollout status deployment/flash-card-io -n flash-card-io --timeout=120s

            echo "Deployment status:"
            kubectl get deployments -n flash-card-io
            kubectl get pods -n flash-card-io
          DEPLOY_SCRIPT

      - name: Verify deployment
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -p "$SERVER_PASSWORD" ssh "$SERVER_USER@$SERVER_HOST" \
            "kubectl get all -n flash-card-io"

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ghcr.io/${{ github.repository_owner }}/flash-card-io:${{ needs.build.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace:** flash-card-io" >> $GITHUB_STEP_SUMMARY
          echo "- **Database:** ${{ vars.DB_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **No external endpoints** (internal bot only)" >> $GITHUB_STEP_SUMMARY
