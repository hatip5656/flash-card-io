## Wordagram backend
##
## Usage: docker compose up --build
##
## API available at http://localhost:3147/api
## TTS runs on k8s server — set TTS_API_URL in .env to enable audio

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: flashcard_io
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d flashcard_io"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.local
    env_file: .env
    environment:
      DATABASE_URL: postgresql://root:root@postgres:5432/flashcard_io
      CEFR_LEVELS: A1,A2,B1,B2
      CRON_TIMEZONE: Europe/Tallinn
      FEATURE_TELEGRAM: "false"
      FEATURE_API: "true"
      FEATURE_DEEPFILTER: "false"
      CACHE_DIR: /app/cache
    ports:
      - "3147:8080"
    volumes:
      - api-cache:/app/cache
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  api-cache:
